[env:esp32-c3-devkitm-1]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200

; Route Serial to the hardware USB-Serial/JTAG controller (visible on COM4).
; Without this, Serial maps to UART0 on GPIO20/GPIO21, which conflicts with
; the SW1 DIP switch inputs on those same pins.
; ARDUINO_USB_MODE=1  → use hardware USB-JTAG/CDC (not TinyUSB)
; ARDUINO_USB_CDC_ON_BOOT=1 → map Serial object to that hardware CDC
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    adafruit/Adafruit BME280 Library
    adafruit/Adafruit Unified Sensor
    nrf24/RF24
    https://github.com/sciosense/ENS160_driver

; ---- OTA upload (use after first USB flash) ----
; Run: pio run -e ota -t upload
[env:ota]
extends         = env:esp32-c3-devkitm-1
upload_protocol = espota
upload_port     = 192.168.50.137   ; or hw20-node4.local
upload_flags    = --auth=kuningas
